<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polyglot Path</title>

<style>

/* RESET */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: "Poppins", sans-serif;
  background: #cfe9ff; /* pastel blue */
}

/* BIG EARTH EMOJI */
.earth-emoji {
  font-size: 10rem;
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* TITLE ON TOP OF EARTH */
.logo-title {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.4rem;
  font-family: "Brush Script MT", cursive;
  color: #003b6f;
  text-align: center;
  width: 100%;
}

/* MENU BUTTON */
.menu-btn {
  position: absolute;
  top: 63%;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 22px;
  font-size: 1.2rem;
  border-radius: 50px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(0,0,0,0.2);
}

/* MENU PANEL */
.menu-panel {
  position: absolute;
  top: 69%;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  max-width: 300px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 15px;
  display: none;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.25);
}

.menu-panel.open {
  display: flex;
}

.menu-link {
  padding: 12px;
  border-radius: 12px;
  background: #e8f4ff;
  text-decoration: none;
  color: #003b6f;
  font-size: 1.1rem;
  text-align: center;
  font-weight: 600;
}

</style>
</head>

<body>

<!-- BIG EARTH EMOJI -->
<div class="earth-emoji">🌍</div>

<!-- TITLE -->
<div class="logo-title">Polyglot Path</div>

<!-- MENU BUTTON -->
<button id="menuToggle" class="menu-btn">✈️ Menu</button>

<!-- MENU -->
<nav id="mainMenu" class="menu-panel">
  <a href="translator.html" class="menu-link">🌐 Translator</a>
  <a href="learning.html" class="menu-link">📚 Learning Place</a>
  <a href="checklist.html" class="menu-link">📆 Checklist</a>
  <a href="quiz.html" class="menu-link">🧠 Quiz</a>
</nav>

<script>
const menuToggle = document.getElementById("menuToggle");
const mainMenu = document.getElementById("mainMenu");

menuToggle.addEventListener("click", () => {
  mainMenu.classList.toggle("open");
});
</script>

</body>
</html>
